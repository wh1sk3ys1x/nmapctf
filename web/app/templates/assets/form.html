{% extends "base.html" %}
{% block title %}{{ 'Edit' if asset else 'New' }} Asset — nmapctf{% endblock %}
{% block content %}
<h1>{{ 'Edit' if asset else 'New' }} Asset</h1>

<form method="post" action="{{ '/assets/' ~ asset.id if asset else '/assets/' }}" class="mt-3" style="max-width: 600px;">
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" id="name" name="name" required
           value="{{ asset.name if asset else '' }}">
  </div>
  <div class="mb-3">
    <label for="type" class="form-label">Type</label>
    <select class="form-select" id="type" name="type" required>
      {% for t in asset_types %}
      <option value="{{ t.value }}" {{ 'selected' if asset and asset.type == t else '' }}>{{ t.value }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="address" class="form-label">Address</label>
    <input type="text" class="form-control" id="address" name="address" required
           placeholder="IP, hostname, CIDR, or range"
           value="{{ asset.address if asset else '' }}">
  </div>
  <div class="mb-3">
    <label for="notes" class="form-label">Notes</label>
    <textarea class="form-control" id="notes" name="notes" rows="3">{{ asset.notes if asset and asset.notes else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">{{ 'Update' if asset else 'Create' }}</button>
  <a href="/assets" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
