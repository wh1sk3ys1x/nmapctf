{% extends "base.html" %}
{% block title %}Run Scan — nmapctf{% endblock %}
{% block content %}
<h1>Run Scan</h1>

<form method="post" action="/scans/run" class="mt-3" style="max-width: 600px;">
  <div class="mb-3">
    <label class="form-label">Target</label>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="target_type" id="target_quick" value="quick" checked onchange="toggleTarget()">
      <label class="form-check-label" for="target_quick">Quick Target</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="target_type" id="target_asset" value="asset" onchange="toggleTarget()">
      <label class="form-check-label" for="target_asset">Existing Asset</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="target_type" id="target_group" value="group" onchange="toggleTarget()">
      <label class="form-check-label" for="target_group">Asset Group</label>
    </div>
  </div>
  <div class="mb-3" id="quick_field">
    <label for="quick_target" class="form-label">IP / Hostname / Subnet</label>
    <input type="text" class="form-control" id="quick_target" name="quick_target" placeholder="e.g. 192.168.1.1 or example.com">
    <div class="form-text">Enter any valid nmap target. An asset will be created automatically.</div>
  </div>
  <div class="mb-3" id="asset_field" style="display: none;">
    <label for="asset_id" class="form-label">Asset</label>
    <select class="form-select" id="asset_id" name="asset_id">
      <option value="">Select asset...</option>
      {% for asset in assets %}
      <option value="{{ asset.id }}">{{ asset.name }} ({{ asset.address }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3" id="group_field" style="display: none;">
    <label for="asset_group_id" class="form-label">Asset Group</label>
    <select class="form-select" id="asset_group_id" name="asset_group_id">
      <option value="">Select group...</option>
      {% for group in groups %}
      <option value="{{ group.id }}">{{ group.name }} ({{ group.assets | length }} assets)</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="profile_id" class="form-label">Scan Profile</label>
    <select class="form-select" id="profile_id" name="profile_id" required>
      <option value="">Select profile...</option>
      {% for profile in profiles %}
      <option value="{{ profile.id }}">{{ profile.name }} — {{ profile.nmap_args }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Start Scan</button>
</form>

<script>
function toggleTarget() {
  const mode = document.querySelector('input[name="target_type"]:checked').value;
  document.getElementById('quick_field').style.display = mode === 'quick' ? '' : 'none';
  document.getElementById('asset_field').style.display = mode === 'asset' ? '' : 'none';
  document.getElementById('group_field').style.display = mode === 'group' ? '' : 'none';
}
</script>
{% endblock %}
