{% extends "base.html" %}
{% block title %}{{ 'Edit' if org else 'New' }} Organization — nmapctf{% endblock %}
{% block content %}
<h1>{{ 'Edit' if org else 'New' }} Organization</h1>

<form method="post" action="{{ '/orgs/' ~ org.id if org else '/orgs/' }}" class="mt-3" style="max-width: 600px;">
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" id="name" name="name" required
           value="{{ org.name if org else '' }}">
  </div>
  <button type="submit" class="btn btn-primary">{{ 'Update' if org else 'Create' }}</button>
  <a href="/orgs" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
