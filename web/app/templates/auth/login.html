{% extends "base.html" %}
{% block title %}Login — nmapctf{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top: 12vh;">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <span style="font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; color: var(--accent);">> nmapctf</span>
      <p class="text-muted mt-2" style="font-size: 0.85rem;">Network Scanning Platform</p>
    </div>
    <div class="auth-card p-4">
      {% if error %}
      <div class="alert alert-danger mb-3">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" name="username" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
