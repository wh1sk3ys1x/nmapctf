{% extends "base.html" %}
{% block title %}{{ 'Edit' if profile else 'New' }} Profile — nmapctf{% endblock %}
{% block content %}
<h1>{{ 'Edit' if profile else 'New' }} Scan Profile</h1>

<form method="post" action="{{ '/profiles/' ~ profile.id if profile else '/profiles/' }}" class="mt-3" style="max-width: 600px;">
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" id="name" name="name" required
           value="{{ profile.name if profile else '' }}">
  </div>
  <div class="mb-3">
    <label for="nmap_args" class="form-label">Nmap Arguments</label>
    <input type="text" class="form-control" id="nmap_args" name="nmap_args" required
           placeholder="-sV -sC -p 1-1000"
           value="{{ profile.nmap_args if profile else '' }}">
    <div class="form-text">Raw nmap flags, e.g. <code>-sV -sC -p 1-1000</code></div>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" id="description" name="description" rows="3">{{ profile.description if profile and profile.description else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">{{ 'Update' if profile else 'Create' }}</button>
  <a href="/profiles" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
